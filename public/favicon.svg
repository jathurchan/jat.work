<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="JAT">
  <defs>
    <!-- Google-palette gradients -->
    <linearGradient id="blue" x1="0.1" y1="0" x2="0.6" y2="1">
      <stop offset="0"  stop-color="#5B9CFF"/>
      <stop offset="1"  stop-color="#1A5FE0"/>
    </linearGradient>
    <!-- A peak carries red -> yellow, covering the warm half of the palette -->
    <linearGradient id="redYellow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0"   stop-color="#EA4335"/>
      <stop offset="0.55" stop-color="#F6722A"/>
      <stop offset="1"   stop-color="#FBBC05"/>
    </linearGradient>
    <linearGradient id="green" x1="0.4" y1="0" x2="0.9" y2="1">
      <stop offset="0"  stop-color="#46C764"/>
      <stop offset="1"  stop-color="#0F8A3C"/>
    </linearGradient>
  </defs>

  <style>
    /* Neutral tile adapts to light/dark; letters keep their Google gradients */
    :root{ --bg:#FAFAF8; --border:rgba(0,0,0,0.06); }
    @media (prefers-color-scheme: dark){
      :root{ --bg:#0E0E12; --border:rgba(255,255,255,0.10); }
    }
    .tile { fill: var(--bg); stroke: var(--border); stroke-width: 2; }
    .jstroke { fill:none; stroke:url(#blue); stroke-width:54;
               stroke-linecap:round; stroke-linejoin:round; }
  </style>

  <!-- Flat squircle tile -->
  <rect class="tile" x="24" y="24" width="464" height="464" rx="116"/>

  <!-- T (green) -->
  <path fill="url(#green)" d="M300 152 L474 152 L474 208 L416 208 L416 392 L358 392 L358 208 L300 208 Z"/>

  <!-- J (blue) -->
  <path class="jstroke" d="M290 152 L290 320 Q290 390 222 390 Q156 390 150 322"/>

  <!-- A peak (red -> yellow) — the hero -->
  <path fill="url(#redYellow)" d="M138 392 L256 150 L374 392 L318 392 L256 234 L194 392 Z"/>
</svg>
