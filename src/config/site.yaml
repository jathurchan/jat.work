  - chapter: "04"
    org: RaftLock
    period: "2025"
    role: Open-Source Author & Maintainer
    place: Self-directed
    color: var(--g-green)
    brand: var(--g-green)
    symbol: lock
    variant: project
    demo: true
    transitionIn: 'Back to distributed systems. I wanted to build what I love — so I dove into <a class="route-link" href="https://www.google.com/search?q=Designing+Data-Intensive+Applications+book" target="_blank" rel="noopener noreferrer">Designing Data-Intensive Applications</a> and turned theory into working code.'
    story: >-
