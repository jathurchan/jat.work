  - chapter: "03"
    org: Amazon
    period: "2024"
    role: Software Dev Engineer
    place: Luxembourg
    color: var(--g-yellow)
    brand: var(--g-yellow)
    symbol: cart
    variant: station
    transitionIn: 'From iOS in Paris to backend in Luxembourg: I rejoined Amazon full-time and stepped into an entirely different domain.'
    story: >-
      Enabled the Ireland expansion for Amazon's core third-party Pricing services, coordinating across seven teams to resolve blockers and ship the launch.
    heroMetric: { value: "7+", label: "teams aligned" }
    product:
      label: Seller Central
