  - chapter: "03"
    org: Amazon
    period: "2024"
    role: Software Dev Engineer
    place: Luxembourg
    color: var(--g-yellow)
    brand: var(--g-yellow)
    symbol: cart
    variant: station
    transitionIn: Swapping iOS in Paris for backend engineering in Luxembourg — I rejoined Amazon full-time to tackle completely new problems at a massive scale.
    story: >-
      Enabled the Ireland launch for core 3P Pricing services. Navigating deep ambiguity, I collaborated across distributed teams to drive consensus and unblock the release.
    heroMetric: { value: "7+", label: "teams aligned" }
    product:
      label: Seller Central
      href: https://sellercentral.amazon.com
