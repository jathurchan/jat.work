# ---------------------------------------------------------------------------
# Site configuration. Edit this file to change everything on the page except
# the blog: posts live as Markdown/MDX in content/blog/ and series definitions
# in content/series.yaml (repo root — publishing never touches src/).
# ---------------------------------------------------------------------------

# Identity used in the footer, résumé button, and social links.
profile:
  fullName: Jathurchan Selvakumar
  email: hello@jat.work
  links:
    github: https://github.com/jathurchan
    linkedin: https://www.linkedin.com/in/jathurchan

# SEO / social metadata
meta:
  title: Jathurchan Selvakumar — Software Engineer, SRE
  description: >-
    Jathurchan Selvakumar, Software Engineer & SRE at Google. I build systems
    that survive failure: distributed systems, observability, and RaftLock, a
    Raft-based distributed lock in Go.

# The hero intro. The name animates from `name` down to `nameShort` on load
# (trailing letters collapse into the period). Under it sits the manifest —
# three key/value rows (role / focus / latest) that replaced the two bio
# sentences: the same facts, set as data instead of prose (see Hero.astro).
intro:
  greeting: Hi, I'm
  name: Jathurchan
  nameShort: Jat
  company: Google
  # `role` row. Contains `company` verbatim so the hero can split it out and
  # give it the liquid-gradient treatment.
  role: Software Engineer & SRE at Google
  # `focus` row. In the hero the pillars sit monochrome (colour only blooms on
  # hover — the hero's colour budget belongs to "Google" and the Explore pill);
  # `key`/`color` tie each pillar to its matching toolkit category below.
  pillars:
    - { key: cloud,   label: cloud computing,     color: var(--g-blue) }
    - { key: systems, label: distributed systems, color: var(--g-green) }
    - { key: ai,      label: AI,                  color: var(--g-red) }
  # (The manifest's third row, `latest`, needs no config: its value is the
  # newest post, resolved at build time in Hero.astro — the hero updates itself
  # every time a post ships.)
  # Extra manifest rows revealed by the green traffic light on the intro.json
  # card — details worth having on hand, not worth the first impression.
  details:
    education: "Master's · ENSEA, France"
    basedIn: "Dublin, Ireland"
  # Paired with `role` for the OG-image blurb (og/[...route].ts).
  bio: I build reliable infrastructure and enjoy solving hard scaling problems.

# The toolkit that closes the hero. Grouped by the same three focus areas the
# statement opens with — each category reuses a pillar's `key` and `color`, so
# the tools land in the colour the eye already learned from the statement.
# Languages live in the domain they serve (Go → systems, Python → AI) rather
# than a category of their own.
skills:
  eyebrow: Toolkit
  lead: What I reach for day to day, grouped by the three areas I work in.
  categories:
    - key: cloud
      name: Cloud & Infrastructure
      color: var(--g-blue)
      items: ["AWS / GCP", "Kubernetes", "Terraform", "Docker", "CI/CD"]
    - key: systems
      name: Distributed Systems
      color: var(--g-green)
      items: ["Go", "gRPC", "Protobuf", "Redis", "Kafka"]
    - key: ai
      name: AI & ML
      color: var(--g-red)
      items: ["Python", "LLMs", "RAG", "PyTorch", "Langfuse"]

# Section lead-in for the writing. Posts live as Markdown/MDX in content/blog/;
# series grouping lives beside them in content/series.yaml.
lab:
  eyebrow: Writing
  lead: 'Notes from building real systems: what worked, what broke, and why.'

# Section lead-in for the Career view.
careerHead:
  eyebrow: Work Experience
  lead: "The path so far, in order: from a student research paper to SRE at Google."

# Featured project card + live demo
featured:
  title: RaftLock
  meta: Go · gRPC · Protobuf · 82% coverage
  source: https://github.com/jathurchan/raftlock
  # Short lead-in shown above the interactive demo to frame it.
  eyebrow: Featured Project
  lead: >-
    My longest-running <span class="thread-systems">distributed systems</span>
    project, and the one part of this site you can break yourself.
  tagline: >-
    Raft consensus written from the paper up: <strong>five layers</strong>,
    a purpose-built storage engine, a simulation test harness. Kill two
    nodes and watch the cluster recover.
  # demo chips
  chips:
    - Survives 2 of 5 crashes
    - Raft from scratch
    - 82% test coverage
    - Simulation-tested

# Feed filter tabs + topic taxonomy (single source of truth for the blog).
# `label` is the lowercase terminal-style filter tab; `name` is the title-case
# badge shown on cards and post headers; `color` ties cards, filters, and post
# headers together. Add a topic here and it flows everywhere — no other edits.
filters:
  - { id: all, label: all, color: var(--ink) }
  - { id: cloud, label: cloud computing, name: Cloud Computing, color: var(--g-blue) }
  - { id: systems, label: distributed systems, name: Distributed Systems, color: var(--g-green) }
  - { id: ai, label: AI, name: AI, color: var(--g-red) }
  - { id: career, label: career, name: Career, color: var(--g-yellow) }

# Single source of truth for the in-page section nav (header dropdown +
# scroll-spy). `id` is the section element id; `label` MUST match that
# section's eyebrow so the header and the section headings never drift apart.
nav:
  sections:
    - { id: featured, label: Featured }
    - { id: toolkit, label: Toolkit }
    - { id: experience, label: Experience }
    - { id: writing, label: Writing }

# Career path (Career view). Rendered as a self-drawing route, start → now.
# Order is chronological: the visitor scrolls DOWN to move FORWARD in time.
# `variant` styles the node: station (default) · branch · project · destination.
# `transitionIn` is the narrative beat printed on the connector ABOVE the node.
careerStart:
  kicker: Where it starts
  # `line` is rendered as HTML (see Experience.astro) so it can carry an inline link.
  line: >-
    <p class="route-origin-prose">At 11, a stray "View Source" pulled me in. I
    rebuilt Google Search in raw HTML and didn't stop. <a class="route-link"
    href="https://louislegrand.fr/" target="_blank"
    rel="noopener noreferrer">Lycée Louis-le-Grand</a> (France's most selective high school), then years of classes
    préparatoires: pure mathematics, physics, and logic. The hardest years of my
    life, and the most formative. I kept building through all of it.</p>
    <div class="origin-project">
    <span class="origin-project-eye">Research · 2018–19</span>
    <a class="origin-project-name"
    href="https://github.com/jathurchan/air-route-optimizer" target="_blank"
    rel="noopener noreferrer">Air Route Optimizer ↗</a>
    <p class="origin-project-desc">Multi-objective graph optimizer for air
    traffic networks, co-authored with a classmate under <a
    href="http://jerome.gaertner.free.fr" target="_blank"
    rel="noopener noreferrer">Jérôme Gärtner</a>. The paper that opened the
    door to AWS.</p>
    <div class="origin-project-stats">
    <span class="origin-project-stat">−83% network risk</span>
    <span class="origin-project-stat">Graded A+</span>
    </div></div>
career:
  - chapter: "01"
    org: Amazon Web Services
    period: "2022"
    role: SDE Intern
    place: Dublin
    color: var(--g-yellow)
    brand: var(--g-yellow)
    symbol: dynamo
    variant: station
    transitionIn: >-
      I targeted AWS Dublin, prepped hard on <a
      class="route-link" href="https://leetcode.com/" target="_blank"
      rel="noopener noreferrer">LeetCode</a>, studied Amazon's <a
      class="route-link"
      href="https://www.amazon.jobs/content/en/our-workplace/leadership-principles"
      target="_blank" rel="noopener noreferrer">Leadership Principles</a>, and
      Dublin said yes.
    story: >-
      Built the JNI layer linking DynamoDB's new Rust client to its Java callers, closing the gap between two runtimes without serialization overhead.
    heroMetric: { value: "−28%", label: "p99 latency" }
    product:
      label: Amazon DynamoDB
      href: https://aws.amazon.com/dynamodb
    stack: [Rust, Java, JNI, "Tail Latency", "Async I/O (Tokio)"]

  - chapter: "02"
    org: Amazon Web Services
    period: "2023"
    role: SDE Intern · Return
    place: Dublin
    color: var(--g-yellow)
    brand: var(--g-yellow)
    symbol: dynamo-watch
    variant: station
    transitionIn: 'I deferred my full-time offer and came back for more: one more internship, deeper inside DynamoDB''s internals.'
    story: >-
      Rebuilt the monitoring system watching DynamoDB's metadata store, replacing fragile thresholds with automated canaries that could tell signal from noise.
    heroMetric: { value: "−99%", label: "false alerts" }
    product:
      label: Amazon DynamoDB
      href: https://aws.amazon.com/dynamodb
    stack: [Java, "Distributed Systems", Observability, "Automated Canaries", "Anomaly Detection"]

  - chapter: "—"
    org: Withings
    period: "2023–24"
    role: iOS Engineer
    place: Paris
    color: var(--g-red)
    brand: var(--g-red)
    symbol: health
    variant: branch
    tag: Detour · iOS
    terminus: Paused, for now
    transitionIn: >-
      Master's from <a class="route-link" href="https://www.ensea.fr/en/"
      target="_blank" rel="noopener noreferrer">ENSEA</a>, two AWS internships
      behind me, a full-time offer on the table. I chose to come home to Paris
