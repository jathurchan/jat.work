# ---------------------------------------------------------------------------
# Site configuration. Edit this file to change everything on the page except
# the blog/feed entries, which live as Markdown/MDX in src/content/blog/.
# ---------------------------------------------------------------------------

# Identity used in the footer, résumé button, and social links.
profile:
  fullName: Jathurchan Selvakumar
  email: hello@jat.work
  links:
    github: https://github.com/jathurchan
    linkedin: https://www.linkedin.com/in/jathurchan

# SEO / social metadata
meta:
  title: Jathurchan Selvakumar — Software Engineer, SRE
  description: >-
    Jathurchan Selvakumar — Software Engineer & SRE at Google. I build systems
    that survive failure: distributed systems, observability, and RaftLock, a
    Raft-based distributed lock in Go.

# The hero intro. The name animates from `name` down to `nameShort` on load
# (trailing letters collapse into the period). `pillars` colour-code the three
# focus areas in the statement and thread the same colours through `highlights`.
intro:
  greeting: Hi, I'm
  name: Jathurchan
  nameShort: Jat
  company: Google
  statementLead: Software Engineer & SRE at Google, obsessed with
  # The three colour-coded focus areas. `color` is a CSS token; `key` ties each
  # pillar to its matching highlight card below.
  pillars:
    - { key: cloud,   label: cloud computing,     color: var(--g-blue) }
    - { key: systems, label: distributed systems, color: var(--g-green) }
    - { key: ai,      label: AI,                  color: var(--g-red) }
  bio: I build reliable infrastructure and enjoy solving hard scaling problems.
  # One achievement I'm proud of per pillar (matched by `key`/`color`). Each card
  # reads as: a `context` kicker (where/what), a scannable `bodyHtml` line whose
  # headline metric is wrapped in <strong> (rendered in the pillar colour), and an
  # optional `cta` that links the proof to the section where you can go deeper.
  highlights:
    - key: cloud
      color: var(--g-blue)
      context: Amazon DynamoDB · MemDS
      bodyHtml: >-
        Cut false alerts <strong>99%</strong> in the metadata layer keeping
        DynamoDB healthy at <strong>½M+ req/s</strong>.
      cta: { label: See my AWS experience, href: '#experience' }
    - key: systems
      color: var(--g-green)
      context: RaftLock · open source
      bodyHtml: >-
        Built <strong>Raft consensus</strong> from scratch — a crash-tolerant
        lock in Go, <strong>82%</strong> tested.
      cta: { label: Try the live demo, href: '#featured' }
    - key: ai
      color: var(--g-red)
      context: DeepLearning.AI · Coursera
      bodyHtml: >-
        Studied <strong>Deep Learning</strong>, <strong>GenAI with LLMs</strong>,
        and <strong>RAG</strong> — understanding the models, not just the APIs.
      cta: { label: Read my AI notes, href: '#notes' }

# The toolkit that closes the hero. Grouped by the same three focus areas the
# statement opens with — each category reuses a pillar's `key` and `color`, so
# the tools land in the colour the eye already learned from the statement and
# the achievement deck. Languages live in the domain they serve (Go → systems,
# Python → AI) rather than a category of their own.
skills:
  eyebrow: Toolkit
  lead: The languages, frameworks, and tools I build with day to day — grouped by the three areas I work in.
  categories:
    - key: cloud
      name: Cloud & Infrastructure
      color: var(--g-blue)
      items: ["AWS / GCP", "Kubernetes", "Terraform", "Docker", "CI/CD"]
    - key: systems
      name: Distributed Systems
      color: var(--g-green)
      items: ["Go", "gRPC", "PostgreSQL", "Redis", "Kafka"]
    - key: ai
      name: AI & ML
      color: var(--g-red)
      items: ["Python", "LLMs", "RAG", "PyTorch", "Langfuse"]

# Section lead-in for the blog. Posts live as Markdown/MDX in src/content/blog/.
lab:
  eyebrow: Blog
  lead: Notes and deep dives from the systems I build, break, and operate.

# Section lead-in for the Career view.
careerHead:
  eyebrow: Work Experience
  lead: "Every role was a deliberate move. Follow the line — from a first shot at AWS to safeguarding planet-scale systems at Google."

# Featured project card + live demo
featured:
  title: RaftLock
  meta: Go · gRPC · 82% coverage
  source: https://github.com/jathurchan/raftlock
  # Short lead-in shown above the interactive demo to frame it.
  eyebrow: Featured Project
  lead: >-
    Where I go deepest on <span class="thread-systems">distributed systems</span>
    — and the one thing here you can break yourself.
  tagline: >-
    A distributed lock that <strong>survives crashes</strong> — Raft consensus
    built from scratch. Crash a server and watch the cluster recover, live.
  # demo chips
  chips:
    - Survives 2 of 5 crashes
    - Raft from scratch
    - 82% test coverage
    - Go · gRPC

# Feed filter tabs + topic taxonomy (single source of truth for the blog).
# `label` is the lowercase terminal-style filter tab; `name` is the title-case
# badge shown on cards and post headers; `color` ties cards, filters, and post
# headers together. Add a topic here and it flows everywhere — no other edits.
filters:
  - { id: all, label: all, color: var(--ink) }
  - { id: cloud, label: cloud computing, name: Cloud Computing, color: var(--g-blue) }
  - { id: systems, label: distributed systems, name: Distributed Systems, color: var(--g-green) }
  - { id: ai, label: AI, name: AI, color: var(--g-red) }

# Single source of truth for the in-page section nav (header dropdown +
# scroll-spy). `id` is the section element id; `label` MUST match that
# section's eyebrow so the header and the section headings never drift apart.
nav:
  sections:
    - { id: featured, label: Featured }
    - { id: toolkit, label: Toolkit }
    - { id: experience, label: Experience }
    - { id: notes, label: Blog }

# Career path (Career view). Rendered as a self-drawing route, start → now.
# Order is chronological: the visitor scrolls DOWN to move FORWARD in time.
# `variant` styles the node: station (default) · branch · project · destination.
# `transitionIn` is the narrative beat printed on the connector ABOVE the node.
careerStart:
  kicker: Where it starts
  # `line` is rendered as HTML (see Experience.astro) so it can carry an inline link.
  line: >-
    It started by accident — at 11, a stray "View Source" pulled me in, and I came
    out having rebuilt Google Search in raw HTML, CSS and query parameters. At 13, I
    spent a few weeks inside <a class="route-link"
    href="https://medium.com/@infinit/this-is-the-story-of-infinit-an-idea-a-research-project-a-startup-a-human-adventure-and-much-f4564bc30985"
    target="_blank" rel="noopener noreferrer">Infinit</a>, a Paris deep-tech storage
    startup later acquired by Docker.
career:
  - chapter: "01"
    org: Amazon Web Services
    period: "2022"
    role: SDE Intern
    place: Dublin
    color: var(--g-yellow)
    brand: var(--g-yellow)
    symbol: proxy
    variant: station
    transitionIn: >-
      Years of side projects with classmates, from <a class="route-link"
      href="https://louislegrand.fr/" target="_blank" rel="noopener noreferrer">Lycée
      Louis-le-Grand</a> to my master's at <a class="route-link"
      href="https://www.ensea.fr/" target="_blank" rel="noopener noreferrer">ENSEA</a>.
      Then came the real preparation — sharpening my problem-solving on <a
      class="route-link" href="https://leetcode.com/" target="_blank"
      rel="noopener noreferrer">LeetCode</a> and learning to think in Amazon's <a
      class="route-link"
      href="https://www.amazon.jobs/content/en/our-workplace/leadership-principles"
      target="_blank" rel="noopener noreferrer">Leadership Principles</a> — and, with
      it, my first real yes from the industry.
    story: >-
      Built a high-performance JNI bridge for DynamoDB's Rust client — driving down tail latency in high-stakes infrastructure.
    heroMetric: { value: "−28%", label: "p99 latency" }
    product:
      label: Amazon DynamoDB
      href: https://aws.amazon.com/dynamodb
    stack: [Rust, Java, JNI, "Tail Latency", "Async I/O (Tokio)"]

  - chapter: "02"
    org: Amazon Web Services
    period: "2023"
    role: SDE Intern · Return
    place: Dublin
    color: var(--g-yellow)
    brand: var(--g-yellow)
    symbol: canary
    variant: station
    transitionIn: I deferred my full-time offer to complete a second internship — wanting to dive even deeper into DynamoDB's internals.
    story: >-
      Modernized the continuous monitoring system for DynamoDB's metadata store.
    heroMetric: { value: "−99%", label: "false alerts" }
    product:
      label: Amazon DynamoDB
      href: https://aws.amazon.com/dynamodb
    stack: [Java, "Distributed Systems", Observability, "Automated Canaries", "Anomaly Detection"]

  - chapter: "—"
    org: Withings
    period: "2023 — 24"
    role: iOS Engineer
    place: Paris
    color: var(--g-red)
    brand: var(--g-red)
    symbol: pulse
    variant: branch
    tag: Detour · iOS
    terminus: Paused — for now
    transitionIn: Taking an opportunity to return home to Paris, I pivoted to mobile — spending three months teaching myself iOS to land the role.
    story: >-
      Shipped an end-to-end Swift pipeline for AI-driven insights — building health software for the people I love.
    heroMetric: { value: "10M+", label: "users reached" }
    product:
      label: Withings HealthMate
      href: https://www.withings.com/health-mate
